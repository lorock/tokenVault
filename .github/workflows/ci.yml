name: CI

# 仅做构建 + 测试校验。实际部署由 Cloudflare Pages 直接从本仓库构建发布
# （Cloudflare Dashboard 连接 GitHub 仓库，构建命令 npm run build，输出目录 dist）。
# 因此无需 actions/configure-pages / deploy-pages。

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        # 部署目标为 Cloudflare Pages 根目录（自定义域名），base 默认 '/'。
        # 如需子路径部署，在 Cloudflare 构建环境变量中设置 VITE_BASE_URL 即可。
        run: npm run build
