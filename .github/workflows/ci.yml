name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN 部署 Pages 所需的最小权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署，避免并发互相覆盖
concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Pages（获取 base_path 输出）
        # 注意：这里【不使用】 static_site_generator: vite。该选项会在运行时反解析并改写本
        # workflow 文件的 build 步骤来注入 BASE_PATH，在 Node 24 runner 上会触发
        # configure-pages@v5 的已知崩溃（TypeError: error must be an instance of Error）。
        # 改为在下方 Build 步骤手动注入 BASE_PATH（见 env），更透明也更稳。
        # base_path 输出：项目仓库（如 tokenVault）-> /tokenVault/，用户/组织站点 -> /。
        id: pages
        uses: actions/configure-pages@v6
        with:
          enablement: false

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        # 显式注入 BASE_PATH（由上方 configure-pages 产出）；
        # vite.config.js 通过 process.env.BASE_PATH 读取，实现根/子目录自适应。
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    # 仅当推送到主分支时才真正部署；PR 只跑上面的构建/测试校验
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
